version: '3.8'

services:
  db:
    image: pgvector/pgvector:16-pg16
    container_name: atlas_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: atlas_db
      POSTGRES_USER: atlas_admin
      POSTGRES_PASSWORD: supersecure_atlas_password_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_admin -d atlas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: atlas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://atlas_user:atlas_pass@postgres:5432/atlas_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=production_zero_trust_key_atlas_2026
    depends_on:
      - postgres
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://atlas_user:atlas_pass@postgres:5432/atlas_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - redis

  postgres:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_pass
      POSTGRES_DB: atlas_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
